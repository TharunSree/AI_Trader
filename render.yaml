# ── Render Blueprint (Infrastructure as Code) ──
# Deploy: Connect repo on Render dashboard → it auto-detects this file.
# Database: Uses external Neon PostgreSQL (permanently free).
# Worker:  Celery runs inside the web service (free tier has no separate workers).

services:
  # ── Web Server (Django + Daphne + Celery combined) ──
  - type: web
    name: ai-trader-web
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "bash start.sh"
    envVars:
      - key: DATABASE_URL
        sync: false  # Set to your Neon connection string
      - key: REDIS_URL
        fromService:
          name: ai-trader-redis
          type: redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: RENDER
        value: "true"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_WS_URL
        sync: false

  # ── Redis (Celery broker + pub/sub) ──
  - type: redis
    name: ai-trader-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
