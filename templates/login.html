{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8" />
    <title>Authentication | QuantTrader Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a', 950: '#172554' }}
                }}
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap');
        body {
            background-color: #020617; /* slate-950 */
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .login-grid {
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: center center;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative login-grid">
    <div class="absolute inset-0 bg-slate-950/80 pointer-events-none"></div>

    <div class="w-full max-w-sm relative z-10 mx-4">
        <div class="bg-slate-900 border border-slate-800 shadow-xl rounded-lg p-8">
            <div class="flex items-center gap-3 mb-8 justify-center">
                <div class="w-10 h-10 rounded bg-brand-600 flex items-center justify-center text-white font-bold font-mono text-xl">Q</div>
                <div>
                    <h2 class="text-xl font-bold tracking-tight text-white uppercase">QuantTrader</h2>
                    <p class="text-[10px] font-mono text-slate-500 tracking-widest uppercase">Institutional Hub</p>
                </div>
            </div>

            {% if form.errors %}
            <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded text-[10px] uppercase font-mono tracking-widest mb-6 flex items-center gap-3">
                <i class="fas fa-exclamation-triangle"></i>
                Authentication failed. Verify credentials.
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 font-mono" for="id_username">Identifier</label>
                    <input type="text" name="username" id="id_username" class="w-full bg-slate-950 border border-slate-800 text-slate-200 rounded px-4 py-2.5 text-sm font-mono outline-none focus:border-brand-500 transition-colors placeholder-slate-700" placeholder="admin">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 font-mono" for="id_password">Passcode</label>
                    <input type="password" name="password" id="id_password" class="w-full bg-slate-950 border border-slate-800 text-slate-200 rounded px-4 py-2.5 text-sm font-mono outline-none focus:border-brand-500 transition-colors placeholder-slate-700" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold font-mono text-xs py-3 px-4 rounded transition-colors uppercase tracking-widest mt-2 border border-slate-700 hover:border-slate-600">
                    Authenticate
                </button>
            </form>
            
            <div class="mt-8 pt-4 border-t border-slate-800 text-center">
                <p class="text-[9px] font-mono text-slate-600 uppercase tracking-widest">System restricted. Authorized personnel only.</p>
            </div>
        </div>
    </div>
</body>
</html>
